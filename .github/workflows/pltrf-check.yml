name: PLTRF Check

# Preventative Long-Term Repo Fragmentation gate.
# Physics over liturgy: each check below can fail the build. They cover the
# failure modes ctx-entropy.md warns about — broken pointers, duplicate homes,
# missing identity, and orientation-log drift — before a fresh agent hits them.
#
# Pointer scan only flags repo-relative paths (those starting with a known
# top-level folder). Bare filenames in prose, sequence patterns ("-3.md"),
# template placeholders ("ctx-NAME.md"), and external-fork examples are
# intentionally ignored; resolving them needs context the check lacks.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check-pointers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: PLTRF + duplicate-home + identity + orientation gate
        run: |
          set -uo pipefail
          FAIL=0

          # Intentional placeholders — referenced on purpose, not on disk yet
          # (downstream-fork defaults, planned/Backlog entries). Add here when
          # introducing an intentional missing reference; remove when it lands.
          SKIP_LIST=(
            "docs/ctx-orientation.md"
          )

          # Boundary between "real repo-relative path" and "bare filename in
          # prose": a path must start with one of these top-level folders.
          VALID_PREFIX='^(behavior|architecture|development|docs|skills|workflows|design|\.github)/'

          # Basenames allowed to appear in more than one location. Skill folders
          # each carry their own SKILL.md and vendor overlays; READMEs recur.
          ALLOW_DUP=" SKILL.md CLAUDE.md CODEX.md GEMINI.md README.md openai.yaml "

          is_skipped() { local n="$1"; for s in "${SKIP_LIST[@]}"; do [[ "$n" == "$s" ]] && return 0; done; return 1; }

          HOTLOG="docs/memory-ctx/ctx-orientation.md"

          # ---- 1. DUPLICATE HOME (any basename, any folder) ----
          # One canonical home per concept. A basename may resolve to multiple
          # paths ONLY if at most one is a real doc and the rest are pointer
          # stubs (files that declare "is a pointer"). Two+ real copies = fail.
          is_stub() { grep -q "is a pointer" "$1" 2>/dev/null; }
          while IFS= read -r base; do
            [[ "$ALLOW_DUP" == *" $base "* ]] && continue
            mapfile -t hits < <(find . -path ./.git -prune -o -type f -name "$base" -print | sed 's|^\./||')
            [ "${#hits[@]}" -gt 1 ] || continue
            nonstub=0
            for h in "${hits[@]}"; do is_stub "$h" || nonstub=$((nonstub+1)); done
            if [ "$nonstub" -gt 1 ]; then
              echo "::error::Duplicate home: '$base' has $nonstub non-pointer copies:"
              printf "   %s\n" "${hits[@]}"
              FAIL=$((FAIL+1))
            fi
          done < <(find . -path ./.git -prune -o -type f -name '*.md' -print | xargs -n1 basename | sort -u)

          # also catch the ctx-* / context-* prefix collision in the same folder
          for f in $(find . -path ./.git -prune -o -type f -name 'ctx-*.md' -print); do
            core=$(basename "$f" .md); core=${core#ctx-}
            collision="$(dirname "$f")/context-${core}.md"
            if [ -f "$collision" ]; then
              echo "::error::Prefix collision: $f and $collision describe the same concept."
              FAIL=$((FAIL+1))
            fi
          done

          # ---- 2. SESSION IDENTITY ----
          if grep -q "## Session Identity" AGENT.md; then
            echo "[OK] AGENT.md has Session Identity block."
          else
            echo "::error::AGENT.md missing '## Session Identity' block (Mandatory Rule)."
            FAIL=$((FAIL+1))
          fi

          # ---- 3. ORIENTATION LOG: rollover-due + descending order ----
          if [ -f "$HOTLOG" ]; then
            kc=$(grep -c '^## Knob' "$HOTLOG" || true)
            if [ "$kc" -gt 6 ]; then
              echo "::error::Hot log has $kc Knobs (hard max 6). Batch-migrate the oldest back down to the 4-Knob target in ctx-ori-summary-*.md."
              FAIL=$((FAIL+1))
            elif [ "$kc" -gt 4 ]; then
              echo "::warning::Hot log has $kc Knobs (target 4, hard max 6). Rollover due soon — migrate the oldest when convenient."
              echo "[OK] Hot log Knob count = $kc (within hard max 6)."
            else
              echo "[OK] Hot log Knob count = $kc (<= 4 target)."
            fi
            python3 - "$HOTLOG" <<'PY'
          import re, sys
          from datetime import datetime
          text = open(sys.argv[1], encoding="utf-8").read()
          heads = re.findall(r'^##\s+Knob:.*$', text, flags=re.M)
          dates = []
          for h in heads:
              raw = h.rsplit("—", 1)[-1].strip()
              try: dates.append((datetime.strptime(raw, "%A, %B %d, %Y"), h.strip()))
              except ValueError:
                  # tolerate optional trailing ", HH:MM ..." timestamps
                  base = raw.split(",")
                  try: dates.append((datetime.strptime(",".join(base[:3]).strip(), "%A, %B %d, %Y"), h.strip()))
                  except ValueError: print(f"::warning::Unparseable Knob date: {h.strip()}")
          bad = False
          for (dp,hp),(dc,hc) in zip(dates, dates[1:]):
              if dc > dp:
                  print(f"::error::Knob out of order: '{hc}' ({dc.date()}) above older '{hp}' ({dp.date()}).")
                  bad = True
          sys.exit(1 if bad else 0)
          PY
            [ $? -ne 0 ] && FAIL=$((FAIL+1)) || echo "[OK] Hot-log Knobs in descending order."
          fi

          # ---- 4. BROKEN POINTERS (all doc surfaces) ----
          SCAN_FILES=( "CLAUDE.md" "AGENT.md" "Bamboo.md" "README.md" "Documentation.md" "REPORTING_TEMPLATE.md" )
          # The orientation log and its cold summaries are narrative history;
          # they reference deleted paths by design, so exclude them as sources.
          while IFS= read -r f; do SCAN_FILES+=("$f"); done < <(find behavior architecture development docs skills workflows design -type f -name '*.md' ! -name 'ctx-orientation.md' ! -name 'ctx-ori-summary-*.md' 2>/dev/null)

          for SOURCE in "${SCAN_FILES[@]}"; do
            [ -f "$SOURCE" ] || continue
            BT=$(grep -oE '`[a-zA-Z0-9_./-]+\.md`' "$SOURCE" 2>/dev/null | tr -d '`' | sort -u | grep -E "$VALID_PREFIX" || true)
            LK=$(grep -oE '\]\([a-zA-Z0-9_./-]+\.md[^)]*\)' "$SOURCE" 2>/dev/null | sed -E 's/^\]\(([^)#]+).*/\1/' | sort -u | grep -E "$VALID_PREFIX" || true)
            ALL=$(printf "%s\n%s\n" "$BT" "$LK" | sort -u | grep -v '^$' || true)
            while IFS= read -r P; do
              [ -z "$P" ] && continue
              CLEAN="${P%%#*}"
              [[ "$CLEAN" =~ ^https?:// ]] && continue
              [ -z "$CLEAN" ] && continue
              is_skipped "$CLEAN" && continue
              if [ ! -f "$CLEAN" ]; then
                echo "::error file=$SOURCE::Broken pointer in $SOURCE: \`$CLEAN\` does not exist."
                FAIL=$((FAIL+1))
              fi
            done <<< "$ALL"
          done

          echo ""
          if [ "$FAIL" -gt 0 ]; then
            echo "PLTRF gate FAILED: $FAIL issue(s). Fix references/structure, or update SKIP_LIST / ALLOW_DUP for intentional cases."
            exit 1
          fi
          echo "PLTRF gate passed: pointers resolve, one home per concept, identity present, orientation log healthy."